services:
  app_0:
    platform: linux/amd64
    build: .
    command: ["--uds", "/run/app/app0.sock"]
    volumes:
      - app-sockets:/run/app
    networks:
      - compose-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 165MB
    environment:
      - PYTHONPATH=/app

  app_1:
    platform: linux/amd64
    build: .
    command: ["--uds", "/run/app/app1.sock"]
    volumes:
      - app-sockets:/run/app
    networks:
      - compose-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 165MB
    environment:
      - PYTHONPATH=/app

  lb:
    image: haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - app-sockets:/run/app
    ports:
      - "9999:9999"
    networks:
      - compose-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 20MB
    depends_on:
      - app_0
      - app_1

networks:
  compose-network:
    driver: bridge

volumes:
  app-sockets:
