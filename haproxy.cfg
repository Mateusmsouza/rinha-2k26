global
    log stdout format raw local0
    maxconn 2000
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend http-in
    bind *:9999
    default_backend backend

backend backend
    server app0 unix@/run/app/app0.sock check
    server app1 unix@/run/app/app1.sock check
