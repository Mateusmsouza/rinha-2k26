name: PR Checker Quality Gate

on:
  pull_request:
    branches:
      - main

jobs:
  stress-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install k6
        run: |
          gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/bin/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Build and Start Services
        run: docker compose up -d --build

      - name: Wait for Services (Healthcheck)
        run: |
          echo "Aguardando o Load Balancer estar pronto..."
          timeout 60s bash -c 'until curl -s localhost:9999 > /dev/null; do sleep 2; done'

      - name: Run Stress Test
        run: |
          # O Makefile já executa o k6 e limpa o output para exibir apenas o JSON
          make run-stress-test > stress_results.json

      - name: Parse Results
        id: parse_results
        run: |
          RESULT=$(cat stress_results.json)

          # Extraindo valores para o comentário
          P99=$(echo $RESULT | jq -r '.p99')
          SCORE=$(echo $RESULT | jq -r '.scoring.final_score')
          FAIL_RATE=$(echo $RESULT | jq -r '.scoring.failure_rate')
          TOTAL_REQ=$(echo $RESULT | jq -r '.expected.total')

          # Criando corpo do comentário em Markdown
          echo "COMMENT_BODY<<EOF" >> $GITHUB_ENV
          echo "### Resultado do Stress Test (Quality Gate)" >> $GITHUB_ENV
          echo "| Métrica | Valor |" >> $GITHUB_ENV
          echo "| --- | --- |" >> $GITHUB_ENV
          echo "| **Final Score** | $SCORE |" >> $GITHUB_ENV
          echo "| **p99** | $P99 |" >> $GITHUB_ENV
          echo "| **Failure Rate** | $FAIL_RATE |" >> $GITHUB_ENV
          echo "| **Total Requests** | $TOTAL_REQ |" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "#### Detalhamento Scoring:" >> $GITHUB_ENV
          echo "\`\`\`json" >> $GITHUB_ENV
          echo "$RESULT" | jq '.scoring.breakdown' >> $GITHUB_ENV
          echo "\`\`\`" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ env.COMMENT_BODY }}

      - name: Cleanup
        if: always()
        run: docker compose down
