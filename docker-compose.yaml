services:
  app_0:
    build: .
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 165MB

  app_1:
    build: .
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 165MB

  lb:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 20MB
    depends_on:
      - app_0
      - app_1
