worker_processes auto;
worker_rlimit_nofile 1024;

events {
    worker_connections 512;
    multi_accept on;
    use epoll;
}

http {
    upstream backend {
        server unix:/run/app/app0.sock;
        server unix:/run/app/app1.sock;
        keepalive 128;
    }

    access_log off;
    error_log /dev/stderr crit;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    server {
        listen 9999;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
